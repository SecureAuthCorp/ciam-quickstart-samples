# Maps env var patterns to placeholder tokens per language.
# The extraction script uses these to replace real env var references
# with generic {{PLACEHOLDER}} tokens in extracted snippets.

js:
  - pattern: "import.meta.env.ISSUER_URL"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "import.meta.env.CLIENT_ID"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "import.meta.env.REDIRECT_URI"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "import.meta.env.SCOPES"
    placeholder: "{{SCOPES}}"
  - pattern: "import.meta.env.POST_LOGOUT_URI"
    placeholder: "{{POST_LOGOUT_URI}}"

ts:
  - pattern: "environment.issuerUrl"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "environment.clientId"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "environment.redirectUri"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "environment.scopes"
    placeholder: "{{SCOPES}}"
  - pattern: "environment.postLogoutUri"
    placeholder: "{{POST_LOGOUT_URI}}"
