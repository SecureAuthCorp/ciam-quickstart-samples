# Maps env var patterns to placeholder tokens per language.
# The extraction script uses these to replace real env var references
# with generic {{PLACEHOLDER}} tokens in extracted snippets.

js:
  - pattern: "import.meta.env.ISSUER_URL"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "import.meta.env.CLIENT_ID"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "import.meta.env.REDIRECT_URI"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "import.meta.env.SCOPES"
    placeholder: "{{SCOPES}}"
  - pattern: "import.meta.env.POST_LOGOUT_URI"
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: "Config.ISSUER_URL!"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "Config.CLIENT_ID!"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "Config.REDIRECT_URI!"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "Config.SCOPES!"
    placeholder: "{{SCOPES}}"

ts:
  - pattern: "environment.issuerUrl"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "environment.clientId"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "environment.redirectUri"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "environment.scopes"
    placeholder: "{{SCOPES}}"
  - pattern: "environment.postLogoutUri"
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: "import.meta.env.ISSUER_URL"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "import.meta.env.CLIENT_ID"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "import.meta.env.REDIRECT_URI"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "import.meta.env.SCOPES"
    placeholder: "{{SCOPES}}"
  - pattern: "import.meta.env.POST_LOGOUT_URI"
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: 'requireEnv("ISSUER_URL")'
    placeholder: "{{ISSUER_URL}}"
  - pattern: 'requireEnv("CLIENT_ID")'
    placeholder: "{{CLIENT_ID}}"
  - pattern: 'requireEnv("CLIENT_SECRET")'
    placeholder: "{{CLIENT_SECRET}}"
  - pattern: 'requireEnv("REDIRECT_URI")'
    placeholder: "{{REDIRECT_URI}}"
  - pattern: 'requireEnv("POST_LOGOUT_URI")'
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: 'requireEnv("SCOPES")'
    placeholder: "{{SCOPES}}"
  - pattern: "process.env.ISSUER_URL"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "process.env.CLIENT_ID"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "process.env.CLIENT_SECRET"
    placeholder: "{{CLIENT_SECRET}}"
  - pattern: "process.env.REDIRECT_URI"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "process.env.POST_LOGOUT_URI"
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: "process.env.SCOPES"
    placeholder: "{{SCOPES}}"

csharp:
  - pattern: 'RequireEnv("ISSUER_URL")'
    placeholder: "{{ISSUER_URL}}"
  - pattern: 'RequireEnv("CLIENT_ID")'
    placeholder: "{{CLIENT_ID}}"
  - pattern: 'RequireEnv("CLIENT_SECRET")'
    placeholder: "{{CLIENT_SECRET}}"
  - pattern: 'RequireEnv("REDIRECT_URI")'
    placeholder: "{{REDIRECT_URI}}"
  - pattern: 'RequireEnv("POST_LOGOUT_URI")'
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: 'RequireEnv("SCOPES")'
    placeholder: "{{SCOPES}}"

yaml:
  - pattern: "${ISSUER_URL}"
    placeholder: "{{ISSUER_URL}}"
  - pattern: "${CLIENT_ID}"
    placeholder: "{{CLIENT_ID}}"
  - pattern: "${CLIENT_SECRET}"
    placeholder: "{{CLIENT_SECRET}}"
  - pattern: "${REDIRECT_URI}"
    placeholder: "{{REDIRECT_URI}}"
  - pattern: "${POST_LOGOUT_URI}"
    placeholder: "{{POST_LOGOUT_URI}}"
  - pattern: "${SCOPES}"
    placeholder: "{{SCOPES}}"
