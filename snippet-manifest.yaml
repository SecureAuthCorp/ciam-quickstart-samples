# GENERATED — do not edit. Aggregated from per-framework manifest.yaml files.
frameworks:
  react:
    label: React
    lang: tsx
    lib: react-oidc-context
    docs_url: https://github.com/authts/react-oidc-context
    env_file: .env
  angular:
    label: Angular
    lang: ts
    lib: angular-auth-oidc-client
    docs_url: https://github.com/damienbod/angular-auth-oidc-client
    env_file: src/environments/environment.ts
  dotnet:
    label: .NET
    lang: csharp
    lib: Microsoft.AspNetCore.Authentication.OpenIdConnect
    docs_url: https://learn.microsoft.com/en-us/aspnet/core/security/authentication/configure-oidc-web-authentication
    env_file: .env
  java:
    label: Java
    lang: java
    lib: spring-boot-starter-oauth2-client
    docs_url: https://docs.spring.io/spring-security/reference/servlet/oauth2/login/index.html
    env_file: .env
  node:
    label: Node.js
    lang: ts
    lib: openid-client
    docs_url: https://github.com/panva/openid-client
    env_file: .env
  vue:
    label: Vue
    lang: ts
    lib: oidc-client-ts
    docs_url: https://github.com/authts/oidc-client-ts
    env_file: .env
scenarios:
  spa_login_pkce:
    app_type: single_page
    display_name: User Login
    grant: Auth Code + PKCE
    description: Redirect users to SecureAuth for login. PKCE protects against code interception.
    callout: Uses PKCE — no client secret needed. The browser generates a code_verifier/code_challenge pair.
    config_rows:
      - label: Client ID
        value: "{{CLIENT_ID}}"
      - label: Issuer URL
        value: "{{ISSUER_URL}}"
      - label: Redirect URI
        value: "{{REDIRECT_URI}}"
      - label: Post-Logout Redirect URI
        value: "{{POST_LOGOUT_URI}}"
      - label: Scopes
        value: "{{SCOPES}}"
      - label: Grant
        value: Authorization Code + PKCE
    frameworks:
      - react
      - angular
      - vue
  spa_token_refresh:
    app_type: single_page
    display_name: Token Refresh
    grant: Refresh Token
    description: Use refresh tokens to get new access tokens without re-prompting the user. Requires offline_access scope.
    callout: >-
      Requires refresh_token grant type enabled in workspace [OAuth settings](workspace-oauth-general) and in the
      application's [Grant Types](workspace-applications-oauth). Also requires the offline_access scope.
    required_scopes:
      - offline_access
    config_rows:
      - label: Client ID
        value: "{{CLIENT_ID}}"
      - label: Issuer URL
        value: "{{ISSUER_URL}}"
      - label: Redirect URI
        value: "{{REDIRECT_URI}}"
      - label: Post-Logout Redirect URI
        value: "{{POST_LOGOUT_URI}}"
      - label: Scopes
        value: "{{SCOPES}}"
    frameworks:
      - react
      - angular
      - vue
  server_login_auth_code:
    app_type: server_web
    display_name: User Login
    grant: Auth Code + PKCE
    description: >-
      Redirect users to SecureAuth for login. The server holds the client secret and manages the session; PKCE adds
      defense in depth.
    callout: >-
      Server-side flow — the client_secret never reaches the browser. PKCE is still enabled to protect against
      authorization-code interception during the redirect back to /callback.
    config_rows:
      - label: Client ID
        value: "{{CLIENT_ID}}"
      - label: Client Secret
        value: "{{CLIENT_SECRET}}"
      - label: Issuer URL
        value: "{{ISSUER_URL}}"
      - label: Redirect URI
        value: "{{REDIRECT_URI}}"
      - label: Post-Logout Redirect URI
        value: "{{POST_LOGOUT_URI}}"
      - label: Scopes
        value: "{{SCOPES}}"
      - label: Grant
        value: Authorization Code + PKCE
    frameworks:
      - dotnet
      - java
      - node
  server_token_refresh:
    app_type: server_web
    display_name: Token Refresh
    grant: Refresh Token
    description: >-
      Use refresh tokens server-side to renew the user's access token without re-prompting them. Requires the
      offline_access scope.
    callout: >-
      Requires refresh_token grant type enabled in workspace [OAuth settings](workspace-oauth-general) and in the
      application's [Grant Types](workspace-applications-oauth). Also requires the offline_access scope.
    required_scopes:
      - offline_access
    config_rows:
      - label: Client ID
        value: "{{CLIENT_ID}}"
      - label: Client Secret
        value: "{{CLIENT_SECRET}}"
      - label: Issuer URL
        value: "{{ISSUER_URL}}"
      - label: Redirect URI
        value: "{{REDIRECT_URI}}"
      - label: Post-Logout Redirect URI
        value: "{{POST_LOGOUT_URI}}"
      - label: Scopes
        value: "{{SCOPES}}"
      - label: Grant
        value: Authorization Code + PKCE (+ Refresh Token)
    frameworks:
      - dotnet
      - java
      - node
  server_saml_sp_login:
    app_type: saml
    display_name: SAML Login
    grant: SAML 2.0
    description: SAML SSO with SecureAuth as the IdP. The same ACS endpoint accepts SP-initiated and IdP-initiated responses.
    callout: >-
      AuthnRequests are unsigned for simplicity — CIAM accepts unsigned requests by default. For production, configure
      SP request signing per your library's docs.
    lib: "@node-saml/passport-saml"
    config_rows:
      - label: SP Entity ID
        value: "{{SAML_SP_ENTITY_ID}}"
      - label: SP ACS URL
        value: "{{SAML_SP_ACS_URL}}"
      - label: SAML IdP Entity ID
        value: "{{SAML_IDP_ENTITY_ID}}"
      - label: SAML IdP Single Sign-On URL
        value: "{{SAML_IDP_SSO_URL}}"
      - label: SAML IdP Signing Certificate
        value: Download from admin UI → save as ./saml-certificate.pem
      - label: IdP-Initiated SSO URL
        value: "{{SAML_IDP_INITIATED_SSO_URL}}"
        display_only: true
    frameworks:
      - node
