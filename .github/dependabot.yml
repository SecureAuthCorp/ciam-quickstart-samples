version: 2

# `directories:` (plural) + `minor-and-patch` group collapses each framework's
# samples into ~5-7 PRs. Major bumps stay individual for changelog review.
#
# The `security` group (`applies-to: security-updates`) groups vuln-alert bumps
# too — without it they default to one PR each. No `update-types` filter since
# a fix may need a major bump.
#
# NOTE: Dependabot's YAML parser has no aliases / merge keys, so settings are
# duplicated explicitly below.

updates:
  # ── npm samples ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directories:
      - "/samples/react/login-pkce"
      - "/samples/react/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "/samples/angular/login-pkce"
      - "/samples/angular/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "/samples/vue/login-pkce"
      - "/samples/vue/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "/samples/node/login-auth-code"
      - "/samples/node/saml-sp-login"
      - "/samples/node/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "/samples/react-native/login-pkce"
      - "/samples/react-native/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  # ── Maven (Java) ────────────────────────────────────────────────────────
  # Monthly cadence: Spring Boot + plugin updates move slower than npm.
  - package-ecosystem: "maven"
    directories:
      - "/samples/java/login-auth-code"
      - "/samples/java/saml-sp-login"
      - "/samples/java/token-refresh"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  # ── NuGet (.NET) ────────────────────────────────────────────────────────
  # Monthly cadence: Microsoft.* packages bunch around SDK release cycles.
  - package-ecosystem: "nuget"
    directories:
      - "/samples/dotnet/login-auth-code"
      - "/samples/dotnet/saml-sp-login"
      - "/samples/dotnet/token-refresh"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
