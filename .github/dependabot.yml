version: 2

updates:
  # ── npm (samples + scripts) ──────────────────────────────────────────────
  # Shared defaults via YAML anchor: weekly schedule, max 3 open PRs, group
  # minor+patch updates so a single weekly Angular/Vue/RN-monorepo release
  # doesn't fan out into 5+ separate PRs (e.g. @angular/build, @angular/compiler,
  # @angular/forms, @angular/router all bumping in lockstep). Major bumps stay
  # solo so a human reads the changelog before merging.
  - &npm-defaults
    package-ecosystem: "npm"
    directory: "/samples/react/login-pkce"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - <<: *npm-defaults
    directory: "/samples/react/token-refresh"

  - <<: *npm-defaults
    directory: "/samples/angular/login-pkce"

  - <<: *npm-defaults
    directory: "/samples/angular/token-refresh"

  - <<: *npm-defaults
    directory: "/samples/vue/login-pkce"

  - <<: *npm-defaults
    directory: "/samples/vue/token-refresh"

  - <<: *npm-defaults
    directory: "/samples/node/login-auth-code"

  - <<: *npm-defaults
    directory: "/samples/node/saml-sp-login"

  - <<: *npm-defaults
    directory: "/samples/node/token-refresh"

  # React Native — auto-merge workflow excludes /samples/react-native/* by
  # directory match, so bumps always require human review. Dep bumps can
  # break native autolinking / API shapes that `tsc --noEmit` doesn't catch.
  # The "manual-review" label is informational (workflow filter is dir-based).
  - <<: *npm-defaults
    directory: "/samples/react-native/login-pkce"
    labels: ["dependencies", "manual-review"]

  - <<: *npm-defaults
    directory: "/samples/react-native/token-refresh"
    labels: ["dependencies", "manual-review"]

  - <<: *npm-defaults
    directory: "/scripts"

  # ── Maven (Java) ────────────────────────────────────────────────────────
  # Monthly cadence: Spring Boot + plugin updates move slower than npm; weekly
  # noise wasn't paying off.
  - &maven-defaults
    package-ecosystem: "maven"
    directory: "/samples/java/login-auth-code"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - <<: *maven-defaults
    directory: "/samples/java/saml-sp-login"

  - <<: *maven-defaults
    directory: "/samples/java/token-refresh"

  # ── NuGet (.NET) ────────────────────────────────────────────────────────
  # Monthly cadence: Microsoft.* packages bunch around SDK release cycles.
  - &nuget-defaults
    package-ecosystem: "nuget"
    directory: "/samples/dotnet/login-auth-code"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - <<: *nuget-defaults
    directory: "/samples/dotnet/saml-sp-login"

  - <<: *nuget-defaults
    directory: "/samples/dotnet/token-refresh"

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
