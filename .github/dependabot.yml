version: 2

updates:
  # ── npm samples ─────────────────────────────────────────────────────────
  # Within a framework, login-pkce and token-refresh share package.json
  # contents (same React/Angular/Vue versions), so we combine them into a
  # single dependabot entry via `directories:`. With `groups: minor-and-patch`,
  # one weekly PR covers all listed directories instead of one per directory.
  # Major bumps still get individual PRs so a human reads the changelog.
  - &npm-defaults
    package-ecosystem: "npm"
    directories:
      - "/samples/react/login-pkce"
      - "/samples/react/token-refresh"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - <<: *npm-defaults
    directories:
      - "/samples/angular/login-pkce"
      - "/samples/angular/token-refresh"

  - <<: *npm-defaults
    directories:
      - "/samples/vue/login-pkce"
      - "/samples/vue/token-refresh"

  - <<: *npm-defaults
    directories:
      - "/samples/node/login-auth-code"
      - "/samples/node/saml-sp-login"
      - "/samples/node/token-refresh"

  # React Native — auto-merge workflow excludes /samples/react-native/* by
  # directory match, so bumps always require human review. Dep bumps can
  # break native autolinking / API shapes that `tsc --noEmit` doesn't catch.
  # The "manual-review" label is informational (workflow filter is dir-based).
  - <<: *npm-defaults
    directories:
      - "/samples/react-native/login-pkce"
      - "/samples/react-native/token-refresh"
    labels: ["dependencies", "manual-review"]

  - <<: *npm-defaults
    directories:
      - "/scripts"

  # ── Maven (Java) ────────────────────────────────────────────────────────
  # Monthly cadence: Spring Boot + plugin updates move slower than npm.
  - package-ecosystem: "maven"
    directories:
      - "/samples/java/login-auth-code"
      - "/samples/java/saml-sp-login"
      - "/samples/java/token-refresh"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── NuGet (.NET) ────────────────────────────────────────────────────────
  # Monthly cadence: Microsoft.* packages bunch around SDK release cycles.
  - package-ecosystem: "nuget"
    directories:
      - "/samples/dotnet/login-auth-code"
      - "/samples/dotnet/saml-sp-login"
      - "/samples/dotnet/token-refresh"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
