name: Test JS Frameworks

on:
  push:
    branches: [main]
    paths:
      - "samples/react/**"
      - "samples/angular/**"
      - "samples/vue/**"
      - "samples/node/**"
      - "samples/react-native/**"
      - ".github/workflows/test-js.yml"
  pull_request:
    paths:
      - "samples/react/**"
      - "samples/angular/**"
      - "samples/vue/**"
      - "samples/node/**"
      - "samples/react-native/**"
      - ".github/workflows/test-js.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: find
        run: |
          DIRS=$(find samples -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$DIRS" >> "$GITHUB_OUTPUT"

  test:
    needs: find-projects
    if: ${{ needs.find-projects.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.find-projects.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: yarn install --immutable
      - name: Check formatting
        working-directory: ${{ matrix.project }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['format:check'] ? 0 : 1)"; then
            yarn format:check
          fi
      - name: Build
        working-directory: ${{ matrix.project }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['build:ci'] ? 0 : 1)"; then
            yarn build:ci
          else
            yarn build
          fi
      - name: Test
        working-directory: ${{ matrix.project }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['test:ci'] ? 0 : 1)"; then
            yarn test:ci
          elif node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            yarn test
          fi

  # Stable aggregator for branch protection.
  all-tests-passed:
    name: JS tests passed
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify test matrix succeeded
        if: needs.test.result != 'success' && needs.test.result != 'skipped'
        run: exit 1
