name: Test JS Frameworks

on:
  push:
    paths:
      - "samples/**"
  pull_request:
    paths:
      - "samples/**"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: find
        run: |
          DIRS=$(find samples -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$DIRS" >> "$GITHUB_OUTPUT"

  test:
    needs: find-projects
    if: ${{ needs.find-projects.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.find-projects.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: yarn install --immutable
      - name: Check formatting
        working-directory: ${{ matrix.project }}
        run: |
          if grep -q '"format:check"' package.json; then
            yarn format:check
          fi
      - name: Build
        working-directory: ${{ matrix.project }}
        run: |
          if grep -q '"build:ci"' package.json; then
            yarn build:ci
          else
            yarn build
          fi
      - name: Test
        working-directory: ${{ matrix.project }}
        run: |
          if grep -q '"test:ci"' package.json; then
            yarn test:ci
          elif grep -q '"test"' package.json; then
            yarn test
          fi
