name: Test Java Frameworks

on:
  push:
    branches: [main]
    paths:
      - "samples/java/**"
      - ".github/workflows/test-java.yml"
  pull_request:
    paths:
      - "samples/java/**"
      - ".github/workflows/test-java.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: find
        run: |
          DIRS=$(find samples -name "pom.xml" -not -path "*/target/*" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$DIRS" >> "$GITHUB_OUTPUT"

  test:
    needs: find-projects
    if: ${{ needs.find-projects.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.find-projects.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Build and test
        working-directory: ${{ matrix.project }}
        run: mvn -B verify

  # Stable aggregator for branch protection.
  all-tests-passed:
    name: Java tests passed
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify test matrix succeeded
        if: needs.test.result != 'success' && needs.test.result != 'skipped'
        run: exit 1
