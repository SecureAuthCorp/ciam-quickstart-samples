name: Quickstart
options:
  bundleIdPrefix: com.secureauth.quickstart.ios.refresh
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

fileGroups:
  - Config.example.xcconfig

packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 1.7.6

targets:
  Quickstart:
    type: application
    platform: iOS
    sources:
      - path: Quickstart
    dependencies:
      - package: AppAuth
    settings:
      base:
        INFOPLIST_FILE: Quickstart/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.secureauth.quickstart.ios.refresh
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # Ad-hoc sign on simulator. Real signing isn't needed but the test bundle
        # needs an `application-identifier` entitlement for Keychain to work.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_STYLE: Manual

  QuickstartTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuickstartTests
    dependencies:
      - target: Quickstart
    settings:
      base:
        SWIFT_VERSION: "5.10"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Quickstart.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Quickstart"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_STYLE: Manual

schemes:
  Quickstart:
    build:
      targets:
        Quickstart: all
        QuickstartTests: [test]
    test:
      targets:
        - QuickstartTests
    run:
      config: Debug
