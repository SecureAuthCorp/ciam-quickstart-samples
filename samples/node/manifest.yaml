framework: node
label: Node.js
lang: ts
lib: openid-client
docs_url: https://github.com/panva/openid-client
env_file: ".env"

scenarios:
  server_login_auth_code:
    app_type: server_web
    display_name: "User Login"
    grant: "Auth Code + PKCE"
    description: "Redirect users to SecureAuth for login. The server holds the client secret and manages the session; PKCE adds defense in depth."
    callout: "Server-side flow — the client_secret never reaches the browser. PKCE is still enabled to protect against authorization-code interception during the redirect back to /callback."
    run_command: "yarn install && yarn start"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE"

  server_token_refresh:
    app_type: server_web
    display_name: "Token Refresh"
    grant: "Refresh Token"
    description: "Use refresh tokens server-side to renew the user's access token without re-prompting them. Requires the offline_access scope."
    callout: "Requires refresh_token grant type enabled in workspace OAuth settings and on the application's Grant Types. Requires the offline_access scope."
    required_scopes:
      - offline_access
    run_command: "yarn install && yarn start"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE (+ Refresh Token)"
