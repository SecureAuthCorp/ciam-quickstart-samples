framework: dotnet
label: .NET
lang: csharp
lib: Microsoft.AspNetCore.Authentication.OpenIdConnect
docs_url: https://learn.microsoft.com/en-us/aspnet/core/security/authentication/configure-oidc-web-authentication
env_file: ".env"

scenarios:
  server_login_auth_code:
    app_type: server_web
    display_name: "User Login"
    grant: "Auth Code + PKCE"
    description: "Redirect users to SecureAuth for login. The server holds the client secret and manages the session; PKCE adds defense in depth."
    callout: "Server-side flow — the client_secret never reaches the browser. PKCE is still enabled to protect against authorization-code interception during the redirect back to /callback."
    run_command: "dotnet restore && dotnet run --project src"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE"
