framework: java
label: Java
lang: java
lib: spring-boot-starter-oauth2-client
docs_url: https://docs.spring.io/spring-security/reference/servlet/oauth2/login/index.html
env_file: ".env"

scenarios:
  server_login_auth_code:
    app_type: server_web
    display_name: "User Login"
    grant: "Auth Code + PKCE"
    description: "Redirect users to SecureAuth for login. The server holds the client secret and manages the session; PKCE adds defense in depth."
    callout: "Server-side flow — the client_secret never reaches the browser. PKCE is still enabled to protect against authorization-code interception during the redirect back to /login/oauth2/code/secureauth."
    run_command: "mvn spring-boot:run"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE"

  server_token_refresh:
    app_type: server_web
    display_name: "Token Refresh"
    grant: "Refresh Token"
    description: "Use refresh tokens server-side to renew the user's access token without re-prompting them. Requires the offline_access scope."
    callout: "Requires refresh_token grant type enabled in workspace [OAuth settings](workspace-oauth-general) and in the application's [Grant Types](workspace-applications-oauth). Also requires the offline_access scope."
    required_scopes:
      - offline_access
    run_command: "mvn spring-boot:run"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE (+ Refresh Token)"
