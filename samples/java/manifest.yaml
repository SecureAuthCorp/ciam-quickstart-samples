framework: java
label: Java
lang: java
lib: spring-boot-starter-oauth2-client
docs_url: https://docs.spring.io/spring-security/reference/servlet/oauth2/login/index.html
env_file: ".env"

scenarios:
  server_login_auth_code:
    app_type: server_web
    display_name: "User Login"
    grant: "Auth Code + PKCE"
    description: "Redirect users to SecureAuth for login. The server holds the client secret and manages the session; PKCE adds defense in depth."
    callout: "Server-side flow — the client_secret never reaches the browser. PKCE is still enabled to protect against authorization-code interception during the redirect back to /login/oauth2/code/secureauth."
    run_command: "mvn spring-boot:run"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE"

  server_token_refresh:
    app_type: server_web
    display_name: "Token Refresh"
    grant: "Refresh Token"
    description: "Use refresh tokens server-side to renew the user's access token without re-prompting them. Requires the offline_access scope."
    callout: "Requires refresh_token grant type enabled in workspace [OAuth settings](workspace-oauth-general) and in the application's [Grant Types](workspace-applications-oauth). Also requires the offline_access scope."
    required_scopes:
      - offline_access
    run_command: "mvn spring-boot:run"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Client Secret"
        value: "{{CLIENT_SECRET}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Post-Logout Redirect URI"
        value: "{{POST_LOGOUT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE (+ Refresh Token)"

  server_saml_sp_login:
    app_type: saml
    display_name: "SAML Login"
    grant: "SAML 2.0"
    description: "SAML SSO with SecureAuth as the IdP. The same ACS endpoint accepts SP-initiated and IdP-initiated responses."
    callout: "Spring Security 6.4 always signs AuthnRequests; this sample reuses the dev TLS keystore as the SP signing credential. CIAM doesn't validate the signature (no SP cert registered), so the request is accepted as if unsigned. For production, generate a dedicated SP signing key and register its public cert in CIAM's SAML SP form."
    run_command: "mvn spring-boot:run"
    lib: "spring-security-saml2-service-provider"
    docs_url: "https://docs.spring.io/spring-security/reference/servlet/saml2/login/index.html"
    config_rows:
      - label: "SP Entity ID"
        value: "{{SAML_SP_ENTITY_ID}}"
      - label: "SP ACS URL"
        value: "{{SAML_SP_ACS_URL}}"
      - label: "SAML IdP Entity ID"
        value: "{{SAML_IDP_ENTITY_ID}}"
      - label: "SAML IdP Single Sign-On URL"
        value: "{{SAML_IDP_SSO_URL}}"
      - label: "SAML IdP Signing Certificate"
        value: "Download from admin UI → save as ./saml-certificate.pem"
      - label: "IdP-Initiated SSO URL"
        value: "{{SAML_IDP_INITIATED_SSO_URL}}"
        display_only: true
