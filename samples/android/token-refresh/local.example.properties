# Custom keys consumed by app/build.gradle.kts → BuildConfig.* fields, then read
# from BuildConfig at runtime. Edit local.properties (gitignored) with your values.
#
# SCOPES MUST include `offline_access` — that's what asks the IdP to issue a
# refresh token alongside the access token.

CLIENT_ID=your-client-id
ISSUER_HOST=your-tenant.us.connect.secureauth.com
ISSUER_PATH=your-workspace
REDIRECT_SCHEME=com.secureauth.quickstart.android.refresh
SCOPES=openid profile email offline_access
