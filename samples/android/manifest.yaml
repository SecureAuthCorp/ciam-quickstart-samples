framework: android
label: Android
lang: kotlin
lib: net.openid:appauth
docs_url: https://github.com/openid/AppAuth-Android
env_file: "local.properties"

scenarios:
  mobile_login_pkce:
    app_type: mobile_desktop
    display_name: "User Login"
    grant: "Auth Code + PKCE"
    description: "Native mobile login via the system browser. PKCE is required — public clients must not embed a secret."
    callout: "Uses Chrome Custom Tabs (the system browser) — never an embedded WebView. AppAuth-Android enforces this for you."
    run_command: "./gradlew :app:installDebug"
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
      - label: "Grant"
        value: "Authorization Code + PKCE"

  mobile_token_refresh:
    app_type: mobile_desktop
    display_name: "Token Refresh"
    grant: "Refresh Token"
    description: "Use refresh tokens to renew access tokens without re-prompting. Requires offline_access. Refresh tokens are stored in Android EncryptedSharedPreferences (Keystore-backed)."
    callout: "Requires refresh_token grant type enabled in workspace [OAuth settings](workspace-oauth-general) and in the application's [Grant Types](workspace-applications-oauth). Also requires the offline_access scope."
    run_command: "./gradlew :app:installDebug"
    required_scopes:
      - offline_access
    config_rows:
      - label: "Client ID"
        value: "{{CLIENT_ID}}"
      - label: "Issuer URL"
        value: "{{ISSUER_URL}}"
      - label: "Redirect URI"
        value: "{{REDIRECT_URI}}"
      - label: "Scopes"
        value: "{{SCOPES}}"
